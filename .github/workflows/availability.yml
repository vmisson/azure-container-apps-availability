name: Container Apps Availability

# Tests the ability to create a Container App Environment in all regions,
# then publishes a static dashboard on GitHub Pages.
#
# Prerequisites (configure once, see the README/chat):
#   - Pages enabled: Settings > Pages > Source = "GitHub Actions"
#   - Azure service principal: secrets AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
#     AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, with a Contributor role on the
#     subscription.

on:
  schedule:
    # Minute 20 (not :00) avoids the top-of-hour congestion where GitHub
    # frequently delays or silently drops scheduled runs.
    - cron: "20 * * * *" # every hour (UTC), at minute 20
  workflow_dispatch:
    inputs:
      regions:
        description: "Regions to test (space-separated). Empty = all."
        required: false
        default: ""
      concurrency:
        description: "Number of regions tested in parallel."
        required: false
        default: "10"

permissions:
  contents: write
  pages: write
  id-token: write

# A single run at a time; do not cancel a run in progress.
concurrency:
  group: availability
  cancel-in-progress: false

jobs:
  test-and-publish:
    runs-on: self-hosted
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: >-
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Prepare the Azure CLI
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az extension add --name containerapp --only-show-errors || true

      - name: Test availability per region
        env:
          # Inputs passed via env (never interpolated in the script => no injection).
          CONCURRENCY: ${{ github.event.inputs.concurrency || '10' }}
          REGIONS_INPUT: ${{ github.event.inputs.regions }}
          RESULTS_FILE: containerapp-capacity-results.csv
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          chmod +x ./test-containerapp-regions.sh
          # Unique prefix per run so resources never clash with a previous run
          # whose async deletion may still be in progress. Kept short (<= 9 chars)
          # to respect the 32-char Container App Environment name limit.
          PREFIX="ca$(printf '%s-%s' "$RUN_ID" "$RUN_ATTEMPT" | sha1sum | cut -c1-6)"
          export PREFIX
          echo "Resource prefix for this run: $PREFIX"
          # REGIONS_INPUT intentionally unquoted to split the regions into arguments.
          # shellcheck disable=SC2086
          ./test-containerapp-regions.sh $REGIONS_INPUT

      - name: Prepare the publish directory
        run: |
          rm -rf _site
          cp -r dashboard _site

      - name: Fetch the previous history
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          base="$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.html_url' 2>/dev/null || true)"
          if [ -z "$base" ]; then
            base="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          fi
          base="${base%/}"
          for file in history.json region-history.json; do
            url="${base}/data/${file}"
            echo "Previous data: $url"
            if curl -fsSL "$url" -o "_site/data/${file}"; then
              echo "  fetched ${file}."
            else
              echo "  no previous ${file} (first run or Pages not published yet)."
            fi
          done

      - name: Generate the dashboard data
        env:
          RESULTS_CSV: containerapp-capacity-results.csv
          DATA_DIR: _site/data
          MAX_HISTORY: "336"
        run: python3 scripts/build-dashboard-data.py

      - name: Generate the README dashboard block
        env:
          DATA_DIR: _site/data
          README_PATH: README.md
          ASSETS_DIR: assets
        run: python3 scripts/render-readme.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Commit the README dashboard
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/history-light.svg assets/history-dark.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(dashboard): automatic README update [skip ci]"
            git push
          fi
